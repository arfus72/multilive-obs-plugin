name: Multi Live Multi-OS Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: Create draft GitHub release when run on a tag
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-2022
            configure: windows-ci-x64
            build: windows-x64
            artifact_glob: build_x64/rundir/RelWithDebInfo/**
          - name: ubuntu-x86_64
            os: ubuntu-24.04
            configure: ubuntu-x86_64
            build: ubuntu-x86_64
            artifact_glob: release/**
          - name: macos-universal
            os: macos-15
            configure: macos
            build: macos
            artifact_glob: release/**

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository --yes ppa:obsproject/obs-studio
          sudo apt update
          sudo apt install --no-install-recommends -y \
            build-essential cmake ninja-build pkg-config jq zsh git \
            libgles2-mesa-dev libsimde-dev obs-studio \
            qt6-base-dev libqt6svg6-dev qt6-base-private-dev

      - name: Select Xcode
        if: runner.os == 'macOS'
        shell: zsh --no-rcs --errexit --pipefail {0}
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.1.0.app/Contents/Developer || true

      - name: Configure
        run: cmake --preset ${{ matrix.configure }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build }}

      - name: Install Ubuntu package tree
        if: runner.os == 'Linux'
        run: cmake --install build_x86_64 --prefix release/RelWithDebInfo --config RelWithDebInfo

      - name: Install macOS package tree
        if: runner.os == 'macOS'
        run: cmake --install build_macos --prefix release/RelWithDebInfo --config RelWithDebInfo

      - name: Create Windows streamer installer payload
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/payload/obs-plugins/64bit, installer/payload/data/obs-plugins/multilive-signature-guard | Out-Null
          Copy-Item -Force build_x64/rundir/RelWithDebInfo/multilive-signature-guard.dll installer/payload/obs-plugins/64bit/
          Copy-Item -Recurse -Force build_x64/rundir/RelWithDebInfo/multilive-signature-guard/locale installer/payload/data/obs-plugins/multilive-signature-guard/
          Compress-Archive -Force -Path installer/* -DestinationPath MultiLiveOBSPlugin-Windows-x64.zip

      - name: Create Linux streamer installer payload
        if: runner.os == 'Linux'
        run: |
          mkdir -p installer-linux/payload
          find release/RelWithDebInfo -type f -name 'multilive-signature-guard.so' -exec cp {} installer-linux/payload/ \;
          if [ -d release/RelWithDebInfo/share ]; then
            mkdir -p installer-linux/payload/share
            cp -R release/RelWithDebInfo/share installer-linux/payload/
          fi
          chmod +x installer-linux/install.sh
          zip -r MultiLiveOBSPlugin-Linux-x86_64.zip installer-linux

      - name: Create macOS streamer installer payload
        if: runner.os == 'macOS'
        shell: zsh --no-rcs --errexit --pipefail {0}
        run: |
          mkdir -p installer-macos/payload
          plugin_path=$(find release/RelWithDebInfo -name 'multilive-signature-guard.plugin' -type d | head -n 1)
          if [[ -n "$plugin_path" ]]; then cp -R "$plugin_path" installer-macos/payload/; fi
          chmod +x "installer-macos/Install Multi Live OBS.command"
          ditto -c -k --sequesterRsrc --keepParent installer-macos MultiLiveOBSPlugin-macOS-universal.zip

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          sha256sum MultiLiveOBSPlugin-*.zip > CHECKSUMS-${{ matrix.name }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MultiLiveOBSPlugin-${{ matrix.name }}
          path: |
            MultiLiveOBSPlugin-*.zip
            CHECKSUMS-${{ matrix.name }}.txt

  release:
    name: Draft release
    if: github.event_name == 'workflow_dispatch' && inputs.create_release && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect checksums
        run: |
          find artifacts -type f -name 'CHECKSUMS-*.txt' -exec cat {} \; > CHECKSUMS.txt
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: CHECKSUMS.txt
          files: |
            artifacts/**/*.zip
            CHECKSUMS.txt
